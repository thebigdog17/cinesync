services:
  # ── Backend API + Socket.IO ──────────────────────────────────────────────
  - type: web
    name: cinesync-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VIDEO_DIR
        value: ./movies
      - key: CLIENT_URL
        # Set this to your frontend Render URL after deploying
        value: https://cinesync-client.onrender.com

  # ── React Frontend ───────────────────────────────────────────────────────
  - type: web
    name: cinesync-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        # Set this to your backend Render URL after deploying
        value: https://cinesync-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
